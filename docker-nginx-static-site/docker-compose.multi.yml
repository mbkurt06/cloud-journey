services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  backend:
    image: node:18
    container_name: backend
    working_dir: /app
    volumes:
      - ./app:/app
    command: node server.js
    restart: always
    networks:
      - app-network

networks:
  app-network: