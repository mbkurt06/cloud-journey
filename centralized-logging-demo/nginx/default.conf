# Backend upstream definition
upstream loggingdemo_backend_upstream {
    server loggingdemo_backend_service:8000;
}

server {
    listen 80;
    server_name localhost;

    # Health check route forwarded to backend
    location /api/ {
        proxy_pass http://loggingdemo_backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Simple root endpoint served by Nginx
    location / {
        return 200 "Centralized Logging Demo - Nginx is running\n";
    }
}