services:
  nginx:
    image: nginx:latest
    container_name: user-demo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    networks:
      - app-network

  backend1:
    build: ./backend
    container_name: user-demo-backend-1
    environment:
      - INSTANCE_NAME=backend-1
      - DB_HOST=db
      - DB_NAME=userdemo
      - DB_USER=userdemo
      - DB_PASSWORD=userdemo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  backend2:
    build: ./backend
    container_name: user-demo-backend-2
    environment:
      - INSTANCE_NAME=backend-2
      - DB_HOST=db
      - DB_NAME=userdemo
      - DB_USER=userdemo
      - DB_PASSWORD=userdemo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  db:
    image: postgres:16
    container_name: user-demo-db
    environment:
      - POSTGRES_DB=userdemo
      - POSTGRES_USER=userdemo
      - POSTGRES_PASSWORD=userdemo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userdemo -d userdemo"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network: