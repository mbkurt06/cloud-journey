<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>User Management</title>
</head>
<body>
  <h1>User Management Demo</h1>

  <h2>Create User</h2>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" placeholder="Password"><br>
  <button onclick="createUser()">Create</button>

  <h2>Sign In</h2>
  <input id="signinEmail" placeholder="Email"><br>
  <input id="signinPassword" placeholder="Password"><br>
  <button onclick="signIn()">Sign In</button>

  <h2>Get User</h2>
  <input id="getEmail" placeholder="Email"><br>
  <button onclick="getUser()">Get User</button>

  <h2>Delete User</h2>
  <input id="deleteEmail" placeholder="Email"><br>
  <button onclick="deleteUser()">Delete</button>

  <h2>Result</h2>
  <pre id="result"></pre>

  <script>
    const result = document.getElementById("result");

    async function createUser() {
      const res = await fetch("/api/v1/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        })
      });
      result.textContent = await res.text();
    }

    async function signIn() {
      const res = await fetch("/api/v1/auth/signin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("signinEmail").value,
          password: document.getElementById("signinPassword").value
        })
      });
      result.textContent = await res.text();
    }

    async function getUser() {
      const email = document.getElementById("getEmail").value;
      const res = await fetch(`/api/v1/users/me?email=${email}`);
      result.textContent = await res.text();
    }

    async function deleteUser() {
      const email = document.getElementById("deleteEmail").value;
      const res = await fetch(`/api/v1/users/me?email=${email}`, {
        method: "DELETE"
      });
      result.textContent = await res.text();
    }
  </script>
</body>
</html>
